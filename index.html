<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Divine | Trade Signal Validator</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080c10;
      --surface: #0d1318;
      --surface2: #111920;
      --border: #1e2d38;
      --gold: #c9a94b;
      --gold-dim: #8a6f2e;
      --green: #2dcc7e;
      --red: #e05252;
      --yellow: #e0b84a;
      --text: #d4dde6;
      --text-dim: #5a7080;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Space Grotesk', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .logo-sub {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    .session-badge {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 4px;
    }

    /* Main layout */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-value.gold { color: var(--gold); }
    .stat-value.green { color: var(--green); }
    .stat-value.red { color: var(--red); }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .btn {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-gold {
      background: var(--gold);
      color: #000;
    }
    .btn-gold:hover { background: #e0bc5c; }

    .btn-outline {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

    /* Alert cards */
    .alerts-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .alert-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .alert-card:hover { border-color: var(--gold-dim); }

    .alert-card.take { border-left: 3px solid var(--green); }
    .alert-card.skip { border-left: 3px solid var(--red); }
    .alert-card.error { border-left: 3px solid var(--yellow); }

    .alert-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      cursor: pointer;
    }

    .alert-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .decision-badge {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      border-radius: 4px;
    }

    .badge-take { background: rgba(45,204,126,0.15); color: var(--green); }
    .badge-skip { background: rgba(224,82,82,0.15); color: var(--red); }
    .badge-error { background: rgba(224,184,74,0.15); color: var(--yellow); }

    .alert-pair {
      font-weight: 700;
      font-size: 16px;
      color: var(--gold);
    }

    .alert-action {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
    }

    .alert-time {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    /* Criteria dots */
    .criteria-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .criterion {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot.pass { background: var(--green); }
    .dot.fail { background: var(--border); }

    /* Alert body */
    .alert-body {
      padding: 0 20px 16px;
      display: none;
      border-top: 1px solid var(--border);
    }

    .alert-body.open { display: block; padding-top: 16px; }

    .reasoning-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .meta-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
    }

    .meta-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .meta-val {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
      margin-top: 2px;
    }

    .lot-highlight { color: var(--gold); }

    .risk-note {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--yellow);
      margin-top: 10px;
      padding: 8px 12px;
      background: rgba(224,184,74,0.06);
      border: 1px solid rgba(224,184,74,0.2);
      border-radius: 6px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }

    .empty-state h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .empty-state p {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.6;
    }

    .webhook-hint {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 16px;
      margin-top: 16px;
      display: inline-block;
      color: var(--gold);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .meta-grid { grid-template-columns: repeat(2, 1fr); }
      header { padding: 16px 20px; }
      .container { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-text">Signal Validator</div>
      <div class="logo-sub">Divine · TradingView → Claude</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    <div class="session-badge" id="sessionStatus">Checking session...</div>
  </div>
</header>

<div class="container">
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Total Alerts</div>
      <div class="stat-value gold" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">TAKE Signals</div>
      <div class="stat-value green" id="statTake">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">SKIP Signals</div>
      <div class="stat-value red" id="statSkip">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Max Lot Size</div>
      <div class="stat-value gold">0.01</div>
    </div>
  </div>

  <div class="controls">
    <div class="section-title">Recent Alerts</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" onclick="loadAlerts()">↻ Refresh</button>
      <button class="btn btn-gold" onclick="sendTest()">⚡ Test Alert</button>
    </div>
  </div>

  <div class="alerts-list" id="alertsList">
    <div class="empty-state">
      <h3>No alerts yet</h3>
      <p>Send a TradingView webhook or click Test Alert<br>to see Claude's analysis appear here.</p>
      <div class="webhook-hint" id="webhookUrl">POST → http://localhost:3000/webhook</div>
    </div>
  </div>
</div>

<script>
  const LABELS = { bos: 'BOS', order_block: 'OB', key_level: 'KL', ma_alignment: 'MA', rsi: 'RSI' };

  function checkSession() {
    const now = new Date();
    const wat = new Date(now.toLocaleString('en-US', { timeZone: 'Africa/Lagos' }));
    const h = wat.getHours();
    const m = wat.getMinutes();
    const time = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')} WAT`;
    const active = h >= 8 && h < 15;
    const el = document.getElementById('sessionStatus');
    el.textContent = active ? `🟢 SESSION ACTIVE · ${time}` : `🔴 OFF-SESSION · ${time}`;
    el.style.color = active ? 'var(--green)' : 'var(--red)';
  }

  function formatTime(iso) {
    return new Date(iso).toLocaleTimeString('en-US', {
      timeZone: 'Africa/Lagos', hour: '2-digit', minute: '2-digit', second: '2-digit'
    }) + ' WAT';
  }

  function renderAlerts(alerts) {
    const el = document.getElementById('alertsList');
    if (!alerts.length) {
      el.innerHTML = `<div class="empty-state">
        <h3>No alerts yet</h3>
        <p>Send a TradingView webhook or click Test Alert<br>to see Claude's analysis appear here.</p>
        <div class="webhook-hint">POST → ${location.origin}/webhook</div>
      </div>`;
      return;
    }

    let takes = 0, skips = 0;
    el.innerHTML = alerts.map((entry, i) => {
      const a = entry.analysis || {};
      const dec = (a.decision || 'ERROR').toUpperCase();
      if (dec === 'TAKE') takes++;
      if (dec === 'SKIP') skips++;

      const cc = a.criteria_check || {};
      const dots = Object.entries(LABELS).map(([k, label]) =>
        `<span class="criterion"><span class="dot ${cc[k] ? 'pass' : 'fail'}"></span>${label}</span>`
      ).join('');

      const badgeClass = dec === 'TAKE' ? 'badge-take' : dec === 'SKIP' ? 'badge-skip' : 'badge-error';
      const cardClass = dec === 'TAKE' ? 'take' : dec === 'SKIP' ? 'skip' : 'error';

      const conf = a.confidence ? `<span style="font-family:var(--mono);font-size:11px;color:var(--text-dim)">${a.confidence}</span>` : '';

      return `
      <div class="alert-card ${cardClass}">
        <div class="alert-header" onclick="toggle(${i})">
          <div class="alert-left">
            <span class="decision-badge ${badgeClass}">${dec}</span>
            <div>
              <div style="display:flex;align-items:center;gap:8px">
                <span class="alert-pair">${entry.alert?.pair || '?'}</span>
                <span class="alert-action">${entry.alert?.action || '?'} · ${entry.alert?.timeframe || 'M15'}</span>
                ${conf}
              </div>
              <div class="criteria-row" style="margin-top:5px">${dots}</div>
            </div>
          </div>
          <div style="text-align:right">
            <div class="alert-time">${formatTime(entry.timestamp)}</div>
            <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-top:3px">${a.criteria_passed ?? '?'}/5 criteria</div>
          </div>
        </div>
        <div class="alert-body" id="body-${i}">
          <div class="reasoning-box">${a.reasoning || 'No reasoning provided.'}</div>
          <div class="meta-grid">
            <div class="meta-item"><div class="meta-label">Lot Size</div><div class="meta-val lot-highlight">0.01</div></div>
            <div class="meta-item"><div class="meta-label">Price</div><div class="meta-val">${entry.alert?.price || 'N/A'}</div></div>
            <div class="meta-item"><div class="meta-label">RSI</div><div class="meta-val">${entry.alert?.rsi || 'N/A'}</div></div>
          </div>
          ${a.risk_note && a.risk_note !== 'None' ? `<div class="risk-note">⚠ ${a.risk_note}</div>` : ''}
        </div>
      </div>`;
    }).join('');

    document.getElementById('statTotal').textContent = alerts.length;
    document.getElementById('statTake').textContent = takes;
    document.getElementById('statSkip').textContent = skips;
  }

  function toggle(i) {
    const el = document.getElementById(`body-${i}`);
    el.classList.toggle('open');
  }

  async function loadAlerts() {
    try {
      const res = await fetch('/alerts');
      const data = await res.json();
      renderAlerts(data);
    } catch (e) {
      console.error(e);
    }
  }

  async function sendTest() {
    const btn = document.querySelector('.btn-gold');
    btn.textContent = 'Analyzing...';
    btn.disabled = true;
    try {
      await fetch('/test', { method: 'POST' });
      await loadAlerts();
    } catch(e) { console.error(e); }
    btn.textContent = '⚡ Test Alert';
    btn.disabled = false;
  }

  checkSession();
  setInterval(checkSession, 30000);
  loadAlerts();
  setInterval(loadAlerts, 10000); // Auto-refresh every 10s
</script>
</body>
</html>
